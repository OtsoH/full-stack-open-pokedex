name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install

      - name: Check style
        run: npm run eslint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install

      - name: Run e2e tests
        run: npm run test:e2e

  deploy:
    if: ${{ github.event_name == 'push' && !contains(toJson(github.event.commits), '#skip') }}
    needs: [build_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  tag_release:
    if: ${{ github.event_name == 'push' && !contains(toJson(github.event.commits), '#skip') }}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        with:
          tag_prefix: v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify_success:
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(toJson(github.event.commits), '#skip') && needs.build_and_test.result == 'success' && needs.deploy.result == 'success' && needs.tag_release.result == 'success' }}
    needs: [build_and_test, deploy, tag_release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord about successful deployment
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: Success
          title: "Deployment succeeded"
          description: |
            A new version was deployed from `${{ github.repository }}`.
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Commit URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0x28a745
          username: GitHub Actions

  notify_failure:
    if: ${{ always() && (needs.build_and_test.result == 'failure' || needs.deploy.result == 'failure' || needs.tag_release.result == 'failure') }}
    needs: [build_and_test, deploy, tag_release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord about pipeline failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: Failure
          title: "Build or deployment failed"
          description: |
            The pipeline failed in `${{ github.repository }}`.
            Branch: `${{ github.ref_name }}`
            Actor: `${{ github.actor }}`
            Commit: `${{ github.sha }}`
            Commit URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xff0000
          username: GitHub Actions